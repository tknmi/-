<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mai's Profile</title>
  <style>
    body {
      margin: 0;
      font-family: 'Noto Sans JP', sans-serif;
      background: linear-gradient(135deg, #ffe6f0, #f0f5ff);
      color: #333;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      backdrop-filter: blur(10px);
    }

    .profile-img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto;
      border: 4px solid #fff;
    }

    h1 {
      text-align: center;
      margin-top: 15px;
      font-size: 28px;
    }

    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 20px;
    }

    .section {
      margin-top: 20px;
    }

    .section h2 {
      font-size: 20px;
      border-left: 4px solid #ff99cc;
      padding-left: 10px;
    }

    .card {
      background: #fff;
      padding: 15px;
      border-radius: 15px;
      margin-top: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .sns {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }

    .sns a {
      text-decoration: none;
      color: white;
      padding: 10px 15px;
      border-radius: 20px;
      font-size: 14px;
    }

    .instagram { background: #ff66a3; }
    .twitter { background: #66ccff; }

    footer {
      text-align: center;
      margin-top: 30px;
      color: #aaa;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="https://via.placeholder.com/120" class="profile-img" alt="profile">

    <h1>まい (Mai)</h1>
    <p class="subtitle">안녕하세요 ♡ 韓国風プロフィール</p>

    <div class="section">
      <h2>自己紹介</h2>
      <div class="card">
        <p>こんにちは！まいです。高校生で、毎日楽しく過ごしています♪</p>
      </div>
    </div>

    <div class="section">
      <h2>好きなこと</h2>
      <div class="card">
        <ul>
          <li>音楽を聴く</li>
          <li>韓国ドラマを見る</li>
          <li>友達と遊ぶ</li>
        </ul>
      </div>
    </div>

    <div class="section">
      <h2>メッセージ</h2>
      <div class="card">
        <p>これからもよろしくお願いします♡</p>
      </div>
    </div>

    <div class="sns">
      <a href="#" class="instagram">Instagram</a>
      <a href="#" class="twitter">Twitter</a>
    </div>

    <footer>
      © 2026 Mai
    </footer>
  </div>

</body>
</html>
